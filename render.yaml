# Configurazione Render.com per il backend Express
# Carica questo file nella root del progetto oppure configura manualmente
# il servizio su https://render.com/dashboard

services:
  - type: web
    name: fiori-di-sandro-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true           # Render genera automaticamente un segreto sicuro
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                   # Imposta manualmente nel dashboard Render
      - key: WHATSAPP_NUMBER
        sync: false                   # Imposta manualmente nel dashboard Render
      - key: DB_PATH
        value: /data/fiori-di-sandro.db
      - key: UPLOAD_PATH
        value: /data/uploads
      - key: FRONTEND_URL
        sync: false                   # URL del frontend Vercel, es: https://fiori-di-sandro.vercel.app
    disk:
      name: data
      mountPath: /data
      sizeGB: 1                       # 1 GB di disco persistente (gratuito su Render)
